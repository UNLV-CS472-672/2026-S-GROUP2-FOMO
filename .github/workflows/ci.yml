name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Node
    runs-on: ubuntu-latest
    env:
      CLERK_WEBHOOK_SECRET: ${{ secrets.CLERK_WEBHOOK_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test (TypeScript coverage)
        run: pnpm test:coverage

      - name: Format check
        run: pnpm format:check

      - name: React Doctor
        uses: millionco/react-doctor@0.0.1
        continue-on-error: true

      - name: Expo Doctor (mobile)
        working-directory: apps/mobile
        run: pnpm dlx expo-doctor
        continue-on-error: true

      # THIS ONLY BUILD THE WEB APP: NO GUARANTEES ABOUT THE MOBILE APP WORKING
      - name: Build
        run: pnpm build
        working-directory: apps/web
        env:
          # Use your Cloud URL and Clerk keys from GitHub Secrets
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies from uv.lock
        working-directory: packages/data_ml
        run: uv sync --frozen

      - name: Run pytest
        working-directory: packages/data_ml
        run: uv run pytest --cov=. --cov-report=term-missing --cov-fail-under=97

      - name: Run mypy (data_ml)
        working-directory: packages/data_ml
        run: uv run mypy . --ignore-missing-imports
