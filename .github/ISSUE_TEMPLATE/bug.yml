name: Bug Report
description: Report a bug or unexpected behavior
title: ''
labels:
  - bug
assignees: []
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the bug in 1–3 sentences.
      placeholder: A clear and concise description of the issue.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: List the steps needed to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. Observe the error ...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: Describe what you expected to happen.
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: Describe what actually happened.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide relevant environment details.
      placeholder: |
        - OS:
        - Browser:
        - Device:
        - App version / commit:
    validations:
      required: false

  - type: textarea
    id: logs_screenshots
    attributes:
      label: Logs / Screenshots
      description: Add any relevant logs, screenshots, or error messages.
      placeholder: Paste logs or attach screenshots here.
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other context about the problem.
      placeholder: Optional
    validations:
      required: false
